<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Aniversário!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="main-wrapper">
        <div id="container-inicial" class="content-container">
            <h1>Feliz aniversário querido!</h1>
            <h2>Oh yeah, mais um ano. Você é o cara?</h2>
            
            <div class="buttons-area">
                <button id="sim">Sim</button>
                <button id="nao">Não</button>
            </div>
        </div>

        <div id="mensagem-final" class="content-container hidden">
            <p id="texto-autoestima">Ah, tem que aumentar essa autoestima! 🎉🎂</p>
            <button id="btn-next">Next</button>
        </div>

        <div id="tela-parabens" class="content-container hidden">
            <h1>🎈 PARABÉNS! 🎈</h1>
            <p>Você é oficialmente o cara!</p>
            <div class="emoji-party">🥳✨🎁</div>
        </div>

        <div id="bolo-box" class="cake-container">
            <div class="candle candle1"></div>
            <div class="candle candle2"></div>
            <div class="candle candle3"></div>

            <div class="cake-layer chocolate layer-bottom"></div>
            <div class="cake-layer chocolate layer-middle"></div>
            <div class="cake-layer icing layer-top"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
